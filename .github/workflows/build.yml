name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          configure-args: -T host=x64 -A win32
        - name: Android32
          os: ubuntu-latest
          target: Android32
        - name: Android64
          os: ubuntu-latest
          target: Android64
        - name: macOS
          os: macos-latest
          target: Mac
        - name: iOS
          os: macos-latest
          target: iOS

    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Build Mod
      uses: geode-sdk/build-geode-mod@main
      with:
        bindings: geode-sdk/bindings
        bindings-ref: main
        combine: true
        target: ${{ matrix.config.target }}
        configure-args: ${{ matrix.config.configure-args }}

  package:
    name: Package Geode Mod
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Mod Output
          path: ${{ steps.build.outputs.build-output }}
